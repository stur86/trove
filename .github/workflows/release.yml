name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create the GitHub release

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        # Strip the leading 'v' so VERSION=0.1.0 matches pyproject.toml and the wheel filename.
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Python dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: cd frontend && bun install

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Build Python wheel
        # uv build produces dist/trove-<version>-py3-none-any.whl
        run: uv build --wheel

      - name: Stamp version into install.sh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: sed "s/__TROVE_VERSION__/${VERSION}/g" install.sh > install-${{ steps.version.outputs.VERSION }}.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          gh release create "$GITHUB_REF_NAME" \
            --title "Trove v${VERSION}" \
            --generate-notes \
            "dist/trove-${VERSION}-py3-none-any.whl" \
            "install-${VERSION}.sh#install.sh"
