name: Attach release assets

# Triggered by manually-published releases. Builds the wheel from the
# release tag and uploads it as a release asset.
# (Automated releases via release.yml attach the wheel directly and are
# created with GITHUB_TOKEN, which does not fire this event.)

on:
  release:
    types: [published]

jobs:
  attach-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: uv sync --group dev && cd frontend && bun install

      - name: Build wheel
        run: uv run doit build_wheel

      - name: Upload wheel to release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "dist/trove-${VERSION}-py3-none-any.whl"
