site_name: Trove
site_description: Local LLM platform for non-technical users
site_url: https://simone-sturniolo.github.io/trove/
docs_dir: docs
repo_url: https://github.com/simone-sturniolo/trove

theme:
  name: material
  logo: assets/gem.svg
  favicon: assets/gem.svg
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path: .
  - admonition
  - attr_list

hooks:
  - docs/hooks/copy_sitemaps.py

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: it
          name: Italiano
          build: true
          nav_translations:
            Home: Home
            User guide: Guida utente
            Admin guide: Guida amministratore
            Developer guide: Guida sviluppatore
            Getting started: Per iniziare
            Running a gem: Eseguire un Gem
            Media input: Input multimediale
            Overview: Panoramica
            Installation: Installazione
            Managing gems: Gestire i Gem
            Managing documents: Gestire i documenti
            Settings: Impostazioni
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Home
            User guide: Benutzerhandbuch
            Admin guide: Administratorhandbuch
            Developer guide: Entwicklerhandbuch
            Getting started: Erste Schritte
            Running a gem: Einen Gem ausführen
            Media input: Medieneingabe
            Overview: Übersicht
            Installation: Installation
            Managing gems: Gems verwalten
            Managing documents: Dokumente verwalten
            Settings: Einstellungen
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Home
            User guide: Guía del usuario
            Admin guide: Guía del administrador
            Developer guide: Guía del desarrollador
            Getting started: Primeros pasos
            Running a gem: Ejecutar un Gem
            Media input: Entrada multimedia
            Overview: Descripción general
            Installation: Instalación
            Managing gems: Gestionar Gems
            Managing documents: Gestionar documentos
            Settings: Configuración
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Home
            User guide: Guide utilisateur
            Admin guide: Guide administrateur
            Developer guide: Guide développeur
            Getting started: Démarrage
            Running a gem: Exécuter un Gem
            Media input: Entrée multimédia
            Overview: Vue d'ensemble
            Installation: Installation
            Managing gems: Gérer les Gems
            Managing documents: Gérer les documents
            Settings: Paramètres
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Home
            User guide: Guia do utilizador
            Admin guide: Guia do administrador
            Developer guide: Guia do desenvolvedor
            Getting started: Primeiros passos
            Running a gem: Executar um Gem
            Media input: Entrada de mídia
            Overview: Visão geral
            Installation: Instalação
            Managing gems: Gerir Gems
            Managing documents: Gerir documentos
            Settings: Configurações
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            User guide: 用户指南
            Admin guide: 管理员指南
            Developer guide: 开发者指南
            Getting started: 入门
            Running a gem: 运行 Gem
            Media input: 媒体输入
            Overview: 概述
            Installation: 安装
            Managing gems: 管理 Gem
            Managing documents: 管理文档
            Settings: 设置

nav:
  - Home: index.md
  - User guide:
    - Getting started: user/index.md
    - Running a gem: user/running-a-gem.md
    - Media input: user/media-input.md
  - Admin guide:
    - Overview: admin/index.md
    - Installation: admin/installation.md
    - Managing gems: admin/gems.md
    - Managing documents: admin/documents.md
    - Settings: admin/settings.md
  - Developer guide:
    - Overview: dev/index.md
    - Setup & installation: dev/setup.md
    - Backend: dev/backend.md
    - Frontend: dev/frontend.md
