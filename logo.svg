<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" role="img" aria-label="Trove — open treasure chest spilling gems">
  <title>Trove</title>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="100" rx="44" ry="4.5" fill="rgba(0,0,0,0.12)"/>

  <!-- ── CHEST ────────────────────────────────────────────────── -->

  <!-- Lid outer body (open backward, shown as trapezoid going upward) -->
  <polygon points="18,57 102,57 99,17 21,17" fill="#8B4F13"/>
  <!-- Lid inner face — slightly lighter, the surface visible when tilted open -->
  <polygon points="20,56 100,56 97,19 23,19" fill="#AB6A1C"/>
  <!-- Horizontal metal band on lid -->
  <rect x="20" y="32" width="80" height="5" rx="1" fill="#D4A820"/>
  <!-- Lid open edge — the exposed lip where the lid meets the chest body -->
  <rect x="18" y="54" width="84" height="4" rx="1" fill="#C89A22"/>

  <!-- Interior — dark velvet visible through the open top -->
  <rect x="20" y="40" width="80" height="17" fill="#150600"/>

  <!-- ── LARGE VIOLET GEM (rising from interior) ──────────────── -->
  <!-- Hexagonal facet geometry matching GemIcon (top-down cut).   -->
  <!-- cx=60 cy=43 r=15  M=inner crown meeting point at cy-r*0.2  -->

  <!-- Soft glow behind gem -->
  <polygon points="51,27 69,27 75,44 60,60 45,44" fill="#7C3AED" opacity="0.15"/>

  <!-- Outer hex face -->
  <polygon points="60,28 73,35.5 73,50.5 60,58 47,50.5 47,35.5" fill="#8B5CF6" opacity="0.92"/>
  <!-- Crown facet (top, lightest) -->
  <polygon points="60,28 73,35.5 60,40 47,35.5" fill="#A78BFA" opacity="0.95"/>
  <!-- Lower side facets -->
  <polygon points="60,40 73,35.5 73,50.5 60,58 47,50.5 47,35.5" fill="#7C3AED" opacity="0.88"/>
  <!-- Base facet (bottom, darkest) -->
  <polygon points="60,40 73,50.5 60,58 47,50.5" fill="#6D28D9" opacity="0.82"/>

  <!-- Chest front body — covers the gem's lower portion, creating the "inside chest" impression -->
  <rect x="18" y="57" width="84" height="36" rx="2" fill="#C07828"/>
  <!-- Subtle upper highlight on front body -->
  <rect x="18" y="57" width="84" height="9" rx="2" fill="#CA8A34"/>

  <!-- Gold rim band — frames the chest opening; overlaps gem waist -->
  <rect x="16" y="52" width="88" height="8" rx="2" fill="#D4A820"/>
  <!-- Rim highlight strip -->
  <rect x="16" y="52" width="88" height="3" rx="2" fill="#EAC838"/>

  <!-- Vertical metal straps on the front face -->
  <rect x="36" y="59" width="5" height="33" rx="1" fill="#D4A820"/>
  <rect x="79" y="59" width="5" height="33" rx="1" fill="#D4A820"/>

  <!-- Central clasp and keyhole -->
  <rect x="50" y="51" width="20" height="11" rx="3" fill="#EAC838"/>
  <circle cx="60" cy="56.5" r="2.8" fill="#8B4F13"/>
  <rect x="58.6" y="56.5" width="2.8" height="4" rx="0.5" fill="#8B4F13"/>

  <!-- Chest base edge reinforcement -->
  <rect x="18" y="90" width="84" height="3" rx="1" fill="#7A4608"/>

  <!-- ── SCATTERED GEMS (same hex facet pattern, tumbling out) ── -->

  <!-- Sapphire (blue) — perched on the right rim, tipping outward -->
  <!-- cx=96 cy=49 r=10 -->
  <g transform="rotate(-15, 96, 49)">
    <polygon points="96,39 104.7,44 104.7,54 96,59 87.3,54 87.3,44" fill="#3B82F6" opacity="0.92"/>
    <polygon points="96,39 104.7,44 96,47 87.3,44"               fill="#60A5FA" opacity="0.95"/>
    <polygon points="96,47 104.7,44 104.7,54 96,59 87.3,54 87.3,44" fill="#2563EB" opacity="0.88"/>
    <polygon points="96,47 104.7,54 96,59 87.3,54"               fill="#1D4ED8" opacity="0.82"/>
  </g>

  <!-- Emerald (green) — flung into the air, upper right -->
  <!-- cx=98 cy=27 r=9 -->
  <g transform="rotate(20, 98, 27)">
    <polygon points="98,18 105.8,22.5 105.8,31.5 98,36 90.2,31.5 90.2,22.5" fill="#10B981" opacity="0.92"/>
    <polygon points="98,18 105.8,22.5 98,25.2 90.2,22.5"               fill="#34D399" opacity="0.95"/>
    <polygon points="98,25.2 105.8,22.5 105.8,31.5 98,36 90.2,31.5 90.2,22.5" fill="#059669" opacity="0.88"/>
    <polygon points="98,25.2 105.8,31.5 98,36 90.2,31.5"               fill="#047857" opacity="0.82"/>
  </g>

  <!-- Teal gem (small) — flying upper left -->
  <!-- cx=14 cy=23 r=8 -->
  <g transform="rotate(-25, 14, 23)">
    <polygon points="14,15 21,19 21,27 14,31 7,27 7,19" fill="#14B8A6" opacity="0.92"/>
    <polygon points="14,15 21,19 14,21.4 7,19"          fill="#2DD4BF" opacity="0.95"/>
    <polygon points="14,21.4 21,19 21,27 14,31 7,27 7,19" fill="#0D9488" opacity="0.88"/>
    <polygon points="14,21.4 21,27 14,31 7,27"           fill="#0F766E" opacity="0.82"/>
  </g>

  <!-- Ruby (red) — fallen at the foot of the chest -->
  <!-- cx=26 cy=97 r=9 -->
  <g transform="rotate(12, 26, 97)">
    <polygon points="26,88 33.8,92.5 33.8,101.5 26,106 18.2,101.5 18.2,92.5" fill="#F43F5E" opacity="0.92"/>
    <polygon points="26,88 33.8,92.5 26,95.2 18.2,92.5"               fill="#FB7185" opacity="0.95"/>
    <polygon points="26,95.2 33.8,92.5 33.8,101.5 26,106 18.2,101.5 18.2,92.5" fill="#E11D48" opacity="0.88"/>
    <polygon points="26,95.2 33.8,101.5 26,106 18.2,101.5"             fill="#BE123C" opacity="0.82"/>
  </g>

</svg>
